# render.yaml — BucaPark Blueprint
#
# DEPLOY:
#   1. render.com → New → Blueprint Instance → conectar repo → Deploy
#   2. Render pedirá los env vars marcados sync:false. Usar:
#        MONGO_URI  = mongodb+srv://bucapark_admin:Bucapark2024@bucapark-cluster.1mnrvag.mongodb.net/bucapark_db?retryWrites=true&w=majority&appName=bucapark-cluster
#        JWT_SECRET = /hz+NIveNxZgIsZ4mkQ0+SEFnrCoGDJIlhh5F/mlFG4=
#   3. Al terminar el deploy, copiar la URL de buca-gateway (ej: buca-gateway.onrender.com)
#   4. Vercel → Settings → Environment Variables:
#        VITE_API_BASE_URL = https://buca-gateway.onrender.com
#
# fromService con property: host inyecta el hostname público del servicio
# (ej: "buca-events.onrender.com"). El gateway lo recibe como *_SERVICE_HOST
# y construye https://{host} internamente.

services:

  # ── auth-service ─────────────────────────────────────────────────────────────
  - type: web
    name: buca-auth
    env: node
    plan: free
    rootDir: auth-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── parks-service ────────────────────────────────────────────────────────────
  - type: web
    name: buca-parks
    env: node
    plan: free
    rootDir: parks-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── reservation-service ──────────────────────────────────────────────────────
  - type: web
    name: buca-reservations
    env: node
    plan: free
    rootDir: reservation-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── events-service ───────────────────────────────────────────────────────────
  - type: web
    name: buca-events
    env: node
    plan: free
    rootDir: events-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── incidents-service ────────────────────────────────────────────────────────
  - type: web
    name: buca-incidents
    env: node
    plan: free
    rootDir: incidents-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── maintenance-service ──────────────────────────────────────────────────────
  - type: web
    name: buca-maintenance
    env: node
    plan: free
    rootDir: maintenance-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── inventory-service ────────────────────────────────────────────────────────
  - type: web
    name: buca-inventory
    env: node
    plan: free
    rootDir: inventory-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── gateway ──────────────────────────────────────────────────────────────────
  # fromService property: host → inyecta el hostname público de cada servicio
  # El gateway reconstruye https://{host} usando la función svcUrl()
  - type: web
    name: buca-gateway
    env: node
    plan: free
    rootDir: gateway
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://bucapark.vercel.app
      - key: AUTH_SERVICE_HOST
        fromService:
          type: web
          name: buca-auth
          property: host
      - key: PARKS_SERVICE_HOST
        fromService:
          type: web
          name: buca-parks
          property: host
      - key: RESERVATION_SERVICE_HOST
        fromService:
          type: web
          name: buca-reservations
          property: host
      - key: EVENTS_SERVICE_HOST
        fromService:
          type: web
          name: buca-events
          property: host
      - key: INCIDENTS_SERVICE_HOST
        fromService:
          type: web
          name: buca-incidents
          property: host
      - key: MAINTENANCE_SERVICE_HOST
        fromService:
          type: web
          name: buca-maintenance
          property: host
      - key: INVENTORY_SERVICE_HOST
        fromService:
          type: web
          name: buca-inventory
          property: host
