# render.yaml — BucaPark Blueprint
#
# IMPORTANTE: Los nombres usan el sufijo -vm9o que Render asignó al crear
# este Blueprint. fromService: property: host resuelve {name}.onrender.com
# usando el nombre del YAML — por eso los nombres DEBEN incluir el sufijo.
#
# Si en el futuro se necesita re-crear el Blueprint desde cero (nuevo sufijo),
# solo hay que reemplazar todos los "-vm9o" por el nuevo sufijo.
#
# DESPUÉS DEL DEPLOY:
#   1. Copiar la URL de buca-gateway-vm9o (ej: buca-gateway-vm9o.onrender.com)
#   2. Vercel Dashboard → Settings → Environment Variables:
#        VITE_API_BASE_URL = https://buca-gateway-vm9o.onrender.com
#
# ENV VARS SECRETAS requeridas en cada servicio (sync:false → se ingresan en dashboard):
#   MONGO_URI  = mongodb+srv://bucapark_admin:Bucapark2024@bucapark-cluster.1mnrvag.mongodb.net/bucapark_db?retryWrites=true&w=majority&appName=bucapark-cluster
#   JWT_SECRET = /hz+NIveNxZgIsZ4mkQ0+SEFnrCoGDJIlhh5F/mlFG4=

services:

  # ── auth-service ─────────────────────────────────────────────────────────────
  - type: web
    name: buca-auth-vm9o
    env: node
    plan: free
    rootDir: auth-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── parks-service ────────────────────────────────────────────────────────────
  - type: web
    name: buca-parks-vm9o
    env: node
    plan: free
    rootDir: parks-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── reservation-service ──────────────────────────────────────────────────────
  - type: web
    name: buca-reservations-vm9o
    env: node
    plan: free
    rootDir: reservation-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── events-service ───────────────────────────────────────────────────────────
  - type: web
    name: buca-events-vm9o
    env: node
    plan: free
    rootDir: events-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── incidents-service ────────────────────────────────────────────────────────
  - type: web
    name: buca-incidents-vm9o
    env: node
    plan: free
    rootDir: incidents-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── maintenance-service ──────────────────────────────────────────────────────
  - type: web
    name: buca-maintenance-vm9o
    env: node
    plan: free
    rootDir: maintenance-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── inventory-service ────────────────────────────────────────────────────────
  - type: web
    name: buca-inventory-vm9o
    env: node
    plan: free
    rootDir: inventory-service
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── gateway ──────────────────────────────────────────────────────────────────
  # fromService: property: host → resuelve {name}.onrender.com
  # Con los nombres -vm9o, host devuelve buca-parks-vm9o.onrender.com ✓
  - type: web
    name: buca-gateway-vm9o
    env: node
    plan: free
    rootDir: gateway
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://bucapark.vercel.app
      - key: AUTH_SERVICE_HOST
        fromService:
          type: web
          name: buca-auth-vm9o
          property: host
      - key: PARKS_SERVICE_HOST
        fromService:
          type: web
          name: buca-parks-vm9o
          property: host
      - key: RESERVATION_SERVICE_HOST
        fromService:
          type: web
          name: buca-reservations-vm9o
          property: host
      - key: EVENTS_SERVICE_HOST
        fromService:
          type: web
          name: buca-events-vm9o
          property: host
      - key: INCIDENTS_SERVICE_HOST
        fromService:
          type: web
          name: buca-incidents-vm9o
          property: host
      - key: MAINTENANCE_SERVICE_HOST
        fromService:
          type: web
          name: buca-maintenance-vm9o
          property: host
      - key: INVENTORY_SERVICE_HOST
        fromService:
          type: web
          name: buca-inventory-vm9o
          property: host
